url: https://adrientaudiere.github.io/dbpq/
template:
  bootstrap: 5
  bslib:
    bg: "#d5ecec"
    fg: "#124444"
    primary: "#63450f"
    secondary: "#3e135a"

articles:
- title: Articles
  navbar: ~
  contents:
  - taxonomy-formats
  - articles/database-relationships

reference:
- title: Download databases
  desc: Download latest versions of reference databases.
  contents:
  - download_unite_db
  - download_silva_db
  - download_pr2_db
  - download_greengenes2_db
  - download_rdp_db
  - download_midori2_db
  - download_bold_db
  - download_diatbarcode_db
  - download_ksgp_db
  - download_ltplus_db
  - download_marjaam_db
  - download_eukaryome_db

- title: Format taxonomy headers
  desc: Convert between taxonomy header formats (SINTAX, UNITE, Greengenes2, dada2).
  contents:
  - format_fasta_db
  - format2dada2
  - format2dada2_species
  - format2sintax

- title: Summarize databases
  desc: Describe and explore database contents.
  contents:
  - count_seq_db
  - count_pattern_db
  - count_unwanted_tax
  - list_ranks_db
  - summarize_db

- title: Diagnose & profile databases
  desc: >
    Check format, integrity, and quality, and profile taxonomic richness and
    cross-database overlap.
  contents:
  - diagnose_db
  - profile_db

- title: Taxonomic assignment
  desc: Assign taxonomy to sequences.
  contents:
  - add_sh_to_taxonomy

- title: Modify databases
  desc: Filter, trim, and transform FASTA databases.
  contents:
  - filter_db
  - cutadapt_rm_primers_db

- title: Search sequences
  desc: Retrieve sequences by taxonomic name.
  contents:
  - search_taxa_db

- title: Utilities
  desc: Helper functions.
  contents:
  - get_file_extension
  - tax_prefixes
  - detect_tax_format
  - is_vsearch_installed
  - find_vsearch
